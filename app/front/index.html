<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Étudiant | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-blue-600 p-4 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic">StudentCloud CRM</h1>
            <ul class="flex space-x-6">
                <li><a href="#" class="hover:underline">Tableau de bord</a></li>
                <li><a href="#" class="hover:underline">Étudiants</a></li>
                <li><a href="#" class="hover:underline">Paramètres</a></li>
            </ul>
        </div>
    </nav>

    <main class="container mx-auto mt-10 px-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-blue-500">
                <h3 class="text-gray-500 uppercase text-xs font-bold">Total Étudiants</h3>
                <p class="text-3xl font-bold">1,248</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-green-500">
                <h3 class="text-gray-500 uppercase text-xs font-bold">Cours Actifs</h3>
                <p class="text-3xl font-bold">42</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border-t-4 border-purple-500">
                <h3 class="text-gray-500 uppercase text-xs font-bold">Taux de Réussite</h3>
                <p class="text-3xl font-bold">89%</p>
            </div>
        </div>

        <div class="mt-10 bg-white p-8 rounded-lg shadow-md">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Ajouter un nouvel étudiant</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" placeholder="Prénom et Nom" class="border p-2 rounded w-full focus:outline-blue-500">
                <input type="email" placeholder="Email" class="border p-2 rounded w-full focus:outline-blue-500">
                <button class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700 transition">Enregistrer</button>
            </div>
        </div>
    </main>

    <footer class="mt-20 text-center text-gray-400 text-sm pb-10">
        Propulsé par Azure VM & Terraform • 2026
    </footer>

</body>
</html>
