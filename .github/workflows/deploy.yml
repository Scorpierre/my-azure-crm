name: Deploy to Azure Dev VM

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP_VM_DEV }}
          username: adminuser
          key: ${{ secrets.SSH_PRIVATE_KEY_VM_DEV }}
          script: |
            # 1. On s'assure d'être au bon endroit avec les bons droits
            sudo mkdir -p /var/www/html
            sudo chown -R adminuser:adminuser /var/www/html
            cd /var/www/html

            # 2. Nettoyage si le dossier n'est pas un repo Git
            if [ ! -d ".git" ]; then
              echo "Le dossier n'est pas un repo Git. Nettoyage en cours..."
              # On supprime tout (y compris l'index.html par défaut de Nginx)
              rm -rf * rm -rf .* 2>/dev/null || true
              git clone https://github.com/${{ github.repository }}.git .
            else
              echo "Repo existant, mise à jour..."
              git fetch origin main
              git reset --hard origin/main
            fi

            # 3. Installation et Build
            npm install
            npm run build

            # 4. Gestion PM2 (On utilise le chemin absolu pour être sûr)
            if pm2 list | grep -q "nest-app"; then
              pm2 restart nest-app
            else
              pm2 start dist/main.js --name "nest-app"
            fi
            pm2 save