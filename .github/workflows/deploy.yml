name: Deploy to Azure Dev VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VM_IP_VM_DEV }}
          username: adminuser
          key: ${{ secrets.SSH_PRIVATE_KEY_VM_DEV }}
          script: |
            sudo git config --global --add safe.directory /var/www/html
            cd /var/www/html
            # Si le dossier .git n'existe pas, on clone. Sinon, on refresh.
            if [ ! -d ".git" ]; then
              sudo git clone https://github.com/Scorpierre/my-azure-crm.git .
            else
              sudo git fetch --all
              sudo git reset --hard origin/main
            fi
            
            sudo npm install
            sudo npm run build
            pm2 restart all || pm2 start dist/main.js --name "nest-app"